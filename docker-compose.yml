services:
  adjfa-team-fixture:
    # Option A: pre-built image from GitHub Container Registry (default)
    image: ghcr.io/YOUR_USERNAME/adjfa-team-fixture:latest

    # Option B: build locally
    # build: .

    container_name: adjfa-team-fixture
    restart: unless-stopped

    # Load config from .env  (cp .env.example .env to get started)
    env_file:
      - .env

    # Or set inline for quick testing:
    # environment:
    #   GOOGLE_SERVICE_ACCOUNT_JSON: '{"type":"service_account",...}'
    #   CALENDAR_ID: "your-calendar-id@group.calendar.google.com"
    #   FIXTURE_URL: "https://www.adjfa.org.uk/fixtureslge/1020"
    #   TEAM_NAME: "Blackburn Football Club (2012)"
    #   UPDATE_FREQUENCY: "360"
    #   DRY_RUN: "false"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
