services:
  ha-fixture-sync:
    # Option A: use the pre-built image from GitHub Container Registry (default)
    image: ghcr.io/YOUR_USERNAME/ha-fixture-sync:latest

    # Option B: build locally (comment out 'image' above and uncomment below)
    # build: .

    container_name: ha-fixture-sync
    restart: unless-stopped

    # Load all config from .env file (copy .env.example → .env to get started)
    env_file:
      - .env

    # Or set values inline (useful for quick testing):
    # environment:
    #   HA_URL: "http://homeassistant.local:8123"
    #   HA_TOKEN: "your_token_here"
    #   CALENDAR: "calendar.blackburn_fc"
    #   FIXTURE_URL: "https://www.adjfa.org.uk/fixtureslge/1020"
    #   TEAM_NAME: "Blackburn Football Club (2012)"
    #   UPDATE_FREQUENCY: "360"
    #   DRY_RUN: "false"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
